<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smash House</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0}
.video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}
.card:hover{transform:scale(1.05);transition:0.3s;}
</style>
</head>

<body class="text-white font-sans">

<!-- VIDEO FONDO -->
<video autoplay muted loop class="video-bg">
<source src="https://cdn.coverr.co/videos/coverr-grilling-burger-5171/1080p.mp4">
</video>

<!-- PANTALLA INICIO -->
<div id="home" class="h-screen flex flex-col justify-center items-center bg-black bg-opacity-60">
<h1 class="text-4xl font-bold mb-4">🔥 Smash House</h1>
<button onclick="enterMenu()" class="bg-yellow-500 px-6 py-3 rounded text-black">
Ver menú
</button>
</div>

<!-- MENÚ -->
<div id="menu" class="hidden">

<div class="p-4 text-center bg-black bg-opacity-80">
<h1 class="text-2xl">🍔 Menú</h1>
</div>

<button onclick="showLogin()" class="fixed top-5 right-5 bg-yellow-500 px-3 py-1 rounded">⚙️</button>

<!-- CATEGORÍAS -->
<div class="flex gap-2 p-3 overflow-x-auto bg-black bg-opacity-70">
<button onclick="renderProducts('all')" class="bg-yellow-500 px-3 py-1 rounded-full">Todo</button>
<button onclick="renderProducts('burgers')" class="bg-gray-800 px-3 py-1 rounded-full">🍔</button>
<button onclick="renderProducts('tacos')" class="bg-gray-800 px-3 py-1 rounded-full">🌮</button>
<button onclick="renderProducts('papas')" class="bg-gray-800 px-3 py-1 rounded-full">🍟</button>
<button onclick="renderProducts('bebidas')" class="bg-gray-800 px-3 py-1 rounded-full">🥤</button>
<button onclick="renderProducts('postres')" class="bg-gray-800 px-3 py-1 rounded-full">🍰</button>
</div>

<div id="products" class="p-4 grid gap-4"></div>

<!-- CARRITO -->
<div class="fixed bottom-5 right-5">
<button onclick="toggleCart()" class="bg-green-500 p-4 rounded-full">
🛒 <span id="count">0</span>
</button>
</div>

<div id="cartPanel" class="fixed bottom-0 left-0 right-0 bg-black p-4 hidden max-h-[70vh] overflow-y-auto">
<h2>Tu pedido</h2>
<div id="cartItems"></div>
<p id="total"></p>

<button onclick="getLocation()" class="bg-blue-500 w-full mt-2">Ubicación 📍</button>
<input id="direccion" placeholder="Dirección" class="w-full text-black mt-2">

<button onclick="sendWhatsApp()" class="bg-green-500 w-full mt-2">Enviar pedido</button>
</div>

</div>

<!-- LOGIN -->
<div id="loginBox" class="fixed inset-0 bg-black hidden flex items-center justify-center">
<div class="bg-gray-900 p-6 rounded">
<input id="passInput" type="password" placeholder="Contraseña" class="p-2 text-black">
<button onclick="login()" class="bg-green-500 w-full mt-2 p-2">Entrar</button>
</div>
</div>

<!-- PANEL ADMIN -->
<div id="adminPanel" class="fixed inset-0 bg-black hidden p-4 overflow-y-auto">
<h2 class="text-xl mb-3">Panel Admin</h2>

<input id="nombre" placeholder="Nombre" class="w-full text-black mb-2">
<input id="precio" type="number" placeholder="Precio" class="w-full text-black mb-2">
<input id="desc" placeholder="Descripción" class="w-full text-black mb-2">
<input type="file" id="imgFile" class="mb-2">

<select id="cat" class="w-full text-black mb-2">
<option value="burgers">Burgers</option>
<option value="tacos">Tacos</option>
<option value="papas">Papas</option>
<option value="bebidas">Bebidas</option>
<option value="postres">Postres</option>
</select>

<button onclick="saveProduct()" class="bg-green-500 w-full mb-2">Guardar</button>
<button onclick="closeAdmin()" class="bg-red-500 w-full mb-2">Cerrar</button>

<div id="adminList"></div>
</div>

<script>

let PASSWORD="1234";

// 25 PRODUCTOS
let products = JSON.parse(localStorage.getItem("products")) || [
{category:"burgers",name:"Clásica",price:90,desc:"Queso",img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd",active:true},
{category:"burgers",name:"Doble",price:120,desc:"Doble carne",img:"https://images.unsplash.com/photo-1550547660-d9450f859349",active:true},
{category:"tacos",name:"Pastor",price:70,desc:"Con piña",img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092",active:true},
{category:"papas",name:"Papas clásicas",price:50,desc:"Crujientes",img:"https://images.unsplash.com/photo-1576107232684-1279f390859f",active:true},
{category:"bebidas",name:"Refresco",price:25,desc:"600ml",img:"https://images.unsplash.com/photo-1581006852262-e4307cf6283a",active:true},
{category:"postres",name:"Brownie",price:45,desc:"Chocolate",img:"https://images.unsplash.com/photo-1606313564200-e75d5e30476c",active:true}
];

// DUPLICAR HASTA 25
while(products.length<25){
products.push({...products[products.length%6],name:products[products.length%6].name+" "+products.length,active:true});
}

let cart=[];
let editIndex=null;
let ubicacion="";

// ENTRAR
function enterMenu(){
home.style.display="none";
menu.classList.remove("hidden");
renderProducts();
}

// RENDER
function renderProducts(cat="all"){
let html="";
products.forEach((p,i)=>{
if((cat==="all"||p.category===cat) && p.active){
html+=`
<div onclick="addToCart(${i})" class="card bg-black bg-opacity-70 p-3 rounded">
<img src="${p.img}" class="w-full h-32 object-cover">
<h3>${p.name}</h3>
<p>$${p.price}</p>
</div>`;
}
});
products.innerHTML=html;
document.getElementById("products").innerHTML=html;
}

// CARRITO
function addToCart(i){
cart.push(products[i]);
updateCart();
}

function updateCart(){
let html="";
let total=0;
cart.forEach(p=>{
html+=`${p.name} $${p.price}<br>`;
total+=p.price;
});
cartItems.innerHTML=html;
totalEl.innerText="$"+total;
count.innerText=cart.length;
}

// UBICACIÓN
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
ubicacion=`https://maps.google.com?q=${pos.coords.latitude},${pos.coords.longitude}`;
alert("Ubicación lista 📍");
});
}

// WHATS
function sendWhatsApp(){
let msg="Pedido:%0A";
cart.forEach(p=>msg+=`${p.name} $${p.price}%0A`);
msg+=`%0A${direccion.value}`;
msg+=`%0A${ubicacion}`;
window.open("https://wa.me/5215550572742?text="+msg);
}

// ADMIN
function showLogin(){loginBox.classList.remove("hidden");}

function login(){
if(passInput.value===PASSWORD){
loginBox.classList.add("hidden");
adminPanel.classList.remove("hidden");
renderAdmin();
}
}

function renderAdmin(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="bg-gray-800 p-2 mb-2">
${p.name}
<button onclick="editProduct(${i})">✏️</button>
<button onclick="toggleActive(${i})">${p.active?"❌":"✔️"}</button>
<button onclick="deleteProduct(${i})">🗑️</button>
</div>`;
});
adminList.innerHTML=html;
}

function toggleActive(i){
products[i].active=!products[i].active;
save();
renderProducts();
renderAdmin();
}

function deleteProduct(i){
products.splice(i,1);
save();
renderProducts();
renderAdmin();
}

function editProduct(i){
let p=products[i];
nombre.value=p.name;
precio.value=p.price;
desc.value=p.desc;
cat.value=p.category;
editIndex=i;
}

async function saveProduct(){
let imgData=products[editIndex]?.img || "";

if(imgFile.files[0]){
let reader=new FileReader();
reader.onload=()=>{imgData=reader.result;saveFinal(imgData);}
reader.readAsDataURL(imgFile.files[0]);
}else{
saveFinal(imgData);
}
}

function saveFinal(imgData){
let p={
name:nombre.value,
price:parseInt(precio.value),
desc:desc.value,
img:imgData,
category:cat.value,
active:true
};

if(editIndex!==null){
products[editIndex]=p;
}else{
products.push(p);
}

save();
renderProducts();
renderAdmin();
editIndex=null;
}

function save(){
localStorage.setItem("products",JSON.stringify(products));
}

function closeAdmin(){
adminPanel.classList.add("hidden");
}

</script>

</body>
</html>
