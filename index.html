<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smash House</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0; font-family:sans-serif;}

/* VIDEO */
.video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* Fallback imagen */
.fallback{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url('https://images.unsplash.com/photo-1550547660-d9450f859349') center/cover;
z-index:-3;
}

/* glass effect */
.glass{
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

/* cards */
.card{
transition:0.3s;
}
.card:hover{
transform:scale(1.05);
}

/* carrito overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:40;
display:none;
}
</style>

</head>

<body class="text-white">

<div class="fallback"></div>

<video autoplay muted loop playsinline class="video-bg">
<source src="https://cdn.coverr.co/videos/coverr-burger-on-the-grill-1578/1080p.mp4">
</video>

<!-- HOME -->
<div id="home" class="h-screen flex flex-col justify-center items-center glass">
<h1 class="text-4xl font-bold mb-4">🔥 Smash House</h1>
<button onclick="enterMenu()" class="bg-yellow-500 px-6 py-3 rounded text-black">Ver menú</button>
</div>

<!-- MENU -->
<div id="menu" class="hidden">

<div class="glass p-4 text-center">
<h1 class="text-2xl">🍔 Menú</h1>
<p>⭐ 4.8 • Ecatepec</p>
</div>

<div id="products" class="p-4 grid gap-4"></div>

<!-- BOTÓN CARRITO -->
<div class="fixed bottom-5 right-5 z-50">
<button onclick="openCart()" class="bg-green-500 p-4 rounded-full shadow-lg">
🛒 <span id="count">0</span>
</button>
</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="closeCart()"></div>

<!-- CARRITO -->
<div id="cartPanel" class="fixed bottom-0 left-0 right-0 bg-black p-4 hidden z-50 rounded-t-xl max-h-[70vh] overflow-y-auto">

<div class="flex justify-between mb-2">
<h2>Tu pedido</h2>
<button onclick="closeCart()">✖</button>
</div>

<div id="cartItems"></div>
<p id="total"></p>

<input id="direccion" placeholder="Dirección" class="w-full text-black mt-2">
<input id="cambio" placeholder="¿Con cuánto pagarás?" class="w-full text-black mt-2">

<button onclick="sendWhatsApp()" class="bg-green-500 w-full mt-2">Enviar pedido</button>

</div>

</div>

<script>

// PRODUCTOS
let products=[
{name:"Clásica",price:90,img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd"},
{name:"Doble",price:120,img:"https://images.unsplash.com/photo-1550547660-d9450f859349"},
{name:"BBQ",price:130,img:"https://images.unsplash.com/photo-1606755962773-d324e0a13086"}
];

while(products.length<25){
products.push({...products[products.length%3],name:"Producto "+products.length});
}

let cart=[];

// ENTRAR
function enterMenu(){
home.style.display="none";
menu.classList.remove("hidden");
renderProducts();
}

// RENDER
function renderProducts(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card glass p-3 rounded">
<img src="${p.img}" class="w-full h-32 object-cover rounded">
<h3>${p.name}</h3>
<p>$${p.price}</p>
<button onclick="addToCart(${i})" class="bg-green-500 w-full mt-2">Agregar</button>
</div>`;
});
productsDiv=document.getElementById("products");
productsDiv.innerHTML=html;
}

// AGREGAR
function addToCart(i){
cart.push(products[i]);
updateCart();
}

// ACTUALIZAR
function updateCart(){
let html="";
let total=0;

cart.forEach((p,i)=>{
html+=`
<div class="flex justify-between items-center">
<span>${p.name} $${p.price}</span>
<button onclick="removeItem(${i})">❌</button>
</div>`;
total+=p.price;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText="Total: $"+total;
document.getElementById("count").innerText=cart.length;
}

// ELIMINAR
function removeItem(i){
cart.splice(i,1);
updateCart();
}

// CARRITO
function openCart(){
cartPanel.classList.remove("hidden");
overlay.style.display="block";
}

function closeCart(){
cartPanel.classList.add("hidden");
overlay.style.display="none";
}

// WHATS
function sendWhatsApp(){
let msg="Pedido:%0A";
cart.forEach(p=>msg+=`${p.name} $${p.price}%0A`);
msg+=`Dirección: ${direccion.value}`;
window.open("https://wa.me/5215550572742?text="+msg);
}

</script>

</body>
</html>
