<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smash House PRO</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0;font-family:sans-serif}
.video-bg{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-2;}
.fallback{position:fixed;top:0;left:0;width:100%;height:100%;background:url('https://images.unsplash.com/photo-1550547660-d9450f859349') center/cover;z-index:-3;}
.glass{background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);}
.card:hover{transform:scale(1.05)}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;z-index:40;}
</style>
</head>

<body class="text-white">

<button id="installBtn" class="fixed bottom-20 left-4 bg-green-500 px-3 py-2 rounded-full z-50">📲</button>

<div class="fallback"></div>

<video autoplay muted loop playsinline class="video-bg">
<source src="https://cdn.coverr.co/videos/coverr-cooking-burger-over-fire-4933/1080p.mp4">
</video>

<!-- HOME -->
<div id="home" class="h-screen flex flex-col justify-center items-center glass">
<h1 class="text-5xl font-bold mb-4">🔥 Smash House</h1>
<p>Las burgers más brutales 🍔</p>
<button onclick="enterMenu()" class="bg-yellow-500 px-6 py-3 rounded text-black mt-4">Ver menú</button>
</div>

<!-- MENU -->
<div id="menu" class="hidden">

<div class="glass p-4 text-center">
<h1 class="text-2xl">🍔 Menú</h1>
<p>⭐ 4.9 • Ecatepec • +500 reseñas</p>
</div>

<!-- CATEGORÍAS -->
<div class="flex gap-2 p-3 overflow-x-auto glass">
<button onclick="renderProducts('all')" class="bg-yellow-500 px-3 py-1 rounded-full">Todo</button>
<button onclick="renderProducts('burger')" class="bg-gray-800 px-3 py-1 rounded-full">🍔</button>
<button onclick="renderProducts('tacos')" class="bg-gray-800 px-3 py-1 rounded-full">🌮</button>
<button onclick="renderProducts('papas')" class="bg-gray-800 px-3 py-1 rounded-full">🍟</button>
<button onclick="renderProducts('bebidas')" class="bg-gray-800 px-3 py-1 rounded-full">🥤</button>
<button onclick="renderProducts('postres')" class="bg-gray-800 px-3 py-1 rounded-full">🍰</button>
</div>

<div id="products" class="p-4 grid gap-4"></div>

<!-- CARRITO -->
<div class="fixed bottom-5 right-5 z-50">
<button onclick="openCart()" class="bg-green-500 p-4 rounded-full">
🛒 <span id="count">0</span>
</button>
</div>

<div id="overlay" class="overlay" onclick="closeCart()"></div>

<div id="cartPanel" class="fixed bottom-0 left-0 right-0 bg-black p-4 hidden z-50">
<div class="flex justify-between">
<h2>Tu pedido</h2>
<button onclick="closeCart()">✖</button>
</div>

<div id="cartItems"></div>
<p id="total"></p>

<button onclick="getLocation()" class="bg-blue-500 w-full mt-2">Ubicación 📍</button>

<input id="direccion" placeholder="Dirección" class="w-full text-black mt-2">
<input id="cambio" placeholder="¿Con cuánto pagarás?" class="w-full text-black mt-2">

<select id="metodoPago" class="w-full text-black mt-2">
<option>Efectivo</option>
<option>Transferencia</option>
</select>

<button onclick="sendWhatsApp()" class="bg-green-500 w-full mt-2">Enviar pedido</button>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center">
<div class="bg-gray-900 p-4 rounded w-11/12">
<h2 id="modalName"></h2>
<p id="modalDesc"></p>
<div id="extras"></div>

<button onclick="confirmAdd()" class="bg-green-500 w-full mt-2">Agregar</button>
<button onclick="closeModal()" class="text-red-400 mt-2">Cerrar</button>
</div>
</div>

<!-- ADMIN -->
<button onclick="showAdmin()" class="fixed top-5 right-5 bg-yellow-500 px-3 py-1 rounded">⚙️</button>

<div id="admin" class="hidden fixed inset-0 bg-black p-4 overflow-y-auto">
<h2>Panel Admin</h2>

<input id="pass" type="password" placeholder="Contraseña" class="text-black">
<button onclick="login()">Entrar</button>

<div id="panel" class="hidden mt-4">

<input id="nombre" placeholder="Nombre" class="text-black">
<input id="precio" placeholder="Precio" class="text-black">
<input id="desc" placeholder="Descripción" class="text-black">
<input id="imagen" placeholder="URL de imagen" class="border p-2 w-full mt-2">
<select id="categoria" class="text-black mt-2">
<option value="burger">🍔 Burgers</option>
<option value="tacos">🌮 Tacos</option>
<option value="papas">🍟 Papas</option>
<option value="bebidas">🥤 Bebidas</option>
<option value="postres">🍰 Postres</option>
</select>
  
<!-- EXTRAS -->
<input id="extraNombre" placeholder="Extra (ej: queso)" class="text-black mt-2">
<input id="extraPrecio" placeholder="Precio extra" class="text-black mt-2">
<button onclick="addExtra()">Agregar extra</button>
<div id="listaExtras"></div>

<button onclick="addProduct()">Agregar producto</button>
<button onclick="closeAdmin()" class="bg-red-500 mt-2 px-3 py-1">Salir</button>

<div id="adminList"></div>
</div>
</div>

<script>

let products=[
{cat:"burger",name:"🔥 Smash Infernal",price:95,desc:"Carne jugosa con queso derretido y ese toque ahumado brutal 🤤",img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd",extras:[{name:"Queso extra",price:15},{name:"Tocino",price:20}],active:true},

{cat:"burger",name:"💣 Doble Explosiva",price:130,desc:"Doble carne, doble queso… puro vicio 🔥",img:"https://images.unsplash.com/photo-1550547660-d9450f859349",extras:[{name:"Extra carne",price:30}],active:true},

{cat:"tacos",name:"🌮 Pastor Supremo",price:75,desc:"Trompo jugoso con piña caramelizada irresistible 😮‍🔥",img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092",extras:[{name:"Queso",price:10}],active:true},

{cat:"papas",name:"🍟 Papas Extremas",price:85,desc:"Crujientes con queso y tocino… adicción pura 🤤",img:"https://images.unsplash.com/photo-1576107232684-1279f390859f",extras:[{name:"Queso extra",price:15}],active:true},

{cat:"bebidas",name:"🥤 Refresco Helado",price:25,desc:"El complemento perfecto para tu burger 🧊",img:"https://images.unsplash.com/photo-1581006852262-e4307cf6283a",extras:[],active:true},

{cat:"postres",name:"🍰 Cheesecake Cremoso",price:60,desc:"Suave, dulce y peligrosamente delicioso 😏",img:"https://images.unsplash.com/photo-1578985545062-69928b1d9587",extras:[],active:true}
];
while(products.length<25){
let base=products[products.length%6];
products.push({
...base,
name:base.name+" "+products.length,
price:base.price+Math.floor(Math.random()*20)
});
}
let cart=[];
let selectedProduct=null;
let ubicacion="";
let extrasTemp=[];

// EXTRAS PANEL
function addExtra(){

let nombre = document.getElementById("extraNombre").value.trim();
let precio = parseFloat(document.getElementById("extraPrecio").value);

if(!nombre || isNaN(precio)){
alert("Completa bien el extra");
return;
}

extrasTemp.push({
name:nombre,
price:precio
});

document.getElementById("extraNombre").value="";
document.getElementById("extraPrecio").value="";

renderExtras();
}

function renderExtras(){
let html="";

extrasTemp.forEach((e,i)=>{
html+=`
<div style="display:flex;justify-content:space-between;margin-bottom:5px;">
<span>${e.name} +$${e.price}</span>
<button onclick="deleteExtra(${i})">❌</button>
</div>
`;
});

listaExtras.innerHTML=html;
}
function deleteExtra(i){
extrasTemp.splice(i,1);
renderExtras();
}
// MENU
function enterMenu(){home.style.display="none";menu.classList.remove("hidden");renderProducts();}

// RENDER
function renderProducts(cat="all"){
let html="";
products.forEach((p,i)=>{
if((cat==="all"||p.cat===cat)&&p.active){
html+=`
<div class="glass p-3 rounded">
<img src="${p.img}" class="w-full h-32 object-cover rounded">
<h3>${p.name}</h3>
<p>${p.desc}</p>
<p class="text-green-400">$${p.price}</p>

<button onclick="openModal(${i})"
class="bg-orange-500 w-10 h-10 flex items-center justify-center rounded text-white text-xl mt-2">+</button>

</div>`;
}
});
document.getElementById("products").innerHTML=html;
}

// MODAL
function openModal(i){
selectedProduct=products[i];
modal.classList.remove("hidden");
modalName.innerText=selectedProduct.name;
modalDesc.innerText=selectedProduct.desc;

let html="";
selectedProduct.extras.forEach(e=>{
html+=`<label><input type="checkbox" data-price="${e.price}"> ${e.name} +$${e.price}</label><br>`;
});
extras.innerHTML=html;
}

function closeModal(){modal.classList.add("hidden");}

// AGREGAR
function confirmAdd(){
let total=selectedProduct.price;
document.querySelectorAll("#extras input").forEach(e=>{
if(e.checked) total+=parseInt(e.dataset.price);
});
cart.push({name:selectedProduct.name,price:total});
updateCart();
closeModal();
}

// CARRITO
function updateCart(){
let html="",total=0;
cart.forEach((p,i)=>{
html+=`${p.name} $${p.price} <button onclick="removeItem(${i})">❌</button><br>`;
total+=p.price;
});
cartItems.innerHTML=html;
document.getElementById("total").innerText="Total: $"+total;
document.getElementById("count").innerText=cart.length;
}

function removeItem(i){cart.splice(i,1);updateCart();}

function openCart(){cartPanel.classList.remove("hidden");overlay.style.display="block";}
function closeCart(){cartPanel.classList.add("hidden");overlay.style.display="none";}

// ADMIN
function showAdmin(){admin.classList.remove("hidden");}
function closeAdmin(){admin.classList.add("hidden");}

function login(){if(pass.value==="1234"){panel.classList.remove("hidden");renderAdmin();}}

function renderAdmin(){
let html="";
products.forEach((p,i)=>{
html+=`
<div style="margin-bottom:10px;border-bottom:1px solid gray;padding:5px;">
<strong>${p.name}</strong>

<div style="margin-top:5px;display:flex;gap:5px;">
<button onclick="deleteP(${i})">❌</button>

<button onclick="toggleP(${i})"
style="background:${p.active?'green':'gray'};color:white;padding:3px 8px;border-radius:20px;">
${p.active?'ON':'OFF'}
</button>

<button onclick="editP(${i})"
style="background:orange;color:white;padding:3px 8px;border-radius:5px;">
✏️
</button>
</div>
</div>`;
});
adminList.innerHTML=html;
}

function deleteP(i){products.splice(i,1);renderAdmin();renderProducts();}
function toggleP(i){products[i].active=!products[i].active;renderAdmin();renderProducts();}
function editP(i){
nombre.value=products[i].name;
precio.value=products[i].price;
desc.value=products[i].desc;
imagen.value = products[i].img;
extrasTemp=products[i].extras||[];
renderExtras();
}

function addProduct(){
products.push({
cat:document.getElementById("categoria").value,
name:nombre.value,
price:parseInt(precio.value),
desc:desc.value,
img: document.getElementById("imagen").value || "https://images.unsplash.com/photo-1504754524776-8f4f37790ca0",
extras:extrasTemp,
active:true
});

extrasTemp=[];
renderExtras();
renderProducts();
renderAdmin();
}

// GEO
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
ubicacion=`https://maps.google.com?q=${pos.coords.latitude},${pos.coords.longitude}`;
});
}

// WHATS
function sendWhatsApp(){

let msg="Pedido:%0A";
let total=0;

// productos
cart.forEach(p=>{
msg+=`${p.name} $${p.price}%0A`;
total+=p.price;
});

// 🔥 LEER BIEN EL INPUT
let inputCambio = document.getElementById("cambio").value.trim();

// quitar símbolos por si escriben "$200"
inputCambio = inputCambio.replace("$","");

// convertir a número
let pago = parseFloat(inputCambio);

// validar
if(isNaN(pago)){
alert("Ingresa correctamente con cuánto pagarás");
return;
}

// 🔥 CALCULAR CAMBIO
let cambioFinal = pago - total;

if(cambioFinal < 0){
alert("El monto es menor al total");
return;
}

// 🔥 MENSAJE CORRECTO
msg+=`Total: $${total}%0A`;
msg+=`Pagará con: $${pago}%0A`;
msg+=`Cambio: $${cambioFinal}%0A`;
msg+=`Método: ${document.getElementById("metodoPago").value}%0A`;
msg+=`Ubicación: ${ubicacion}%0A`;
msg+=`Dirección: ${document.getElementById("direccion").value}`;

window.open("https://wa.me/5215550572742?text="+msg);

}

// INSTALL
installBtn.onclick=()=>{
alert("📲 Agrégame a tu pantalla de inicio\n\nInstrucciones:\nCompartir 📤\nLuego: Agregar a pantalla de inicio");
};

</script>

</body>
</html>
