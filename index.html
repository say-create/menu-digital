<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smash House</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(180deg, #1a1a1a, #000);
}
</style>
</head>

<body class="text-white font-sans">

<!-- HEADER -->
<div class="p-4 text-center bg-black">
<h1 class="text-2xl font-bold">🔥 Smash House</h1>
<p class="text-gray-400 text-sm">Sabor que prende 🔥</p>
</div>

<!-- PRODUCTOS -->
<div id="products" class="p-4 grid gap-4"></div>

<!-- BOTÓN CARRITO -->
<div class="fixed bottom-5 right-5">
<button onclick="toggleCart()" class="bg-green-500 p-4 rounded-full shadow-lg">
🛒 <span id="count">0</span>
</button>
</div>

<!-- MODAL PRODUCTO -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-80 hidden flex items-center justify-center">
  <div class="bg-gray-900 p-4 rounded-lg w-11/12 max-h-[80vh] overflow-y-auto">
    <h2 id="modalName" class="text-xl font-bold"></h2>
    <p id="modalDesc" class="text-gray-400"></p>
    <div id="extras" class="mt-3"></div>

    <button onclick="addToCartWithExtras()" class="bg-green-500 w-full mt-3 py-2 rounded">
      Agregar
    </button>

    <button onclick="closeModal()" class="mt-2 text-red-400">Cerrar</button>
  </div>
</div>

<!-- CARRITO PANEL -->
<div id="cartPanel" class="fixed bottom-0 left-0 right-0 bg-black p-4 hidden max-h-[70vh] overflow-y-auto">
<h2 class="text-lg mb-2">Tu pedido</h2>

<div id="cartItems"></div>

<p id="total" class="mt-2">$0</p>

<!-- AQUÍ YA SOLO APARECE DENTRO DEL CARRITO -->
<select id="pago" class="w-full mt-2 text-black">
<option>Efectivo</option>
<option>Transferencia</option>
</select>

<select id="envio" class="w-full mt-2 text-black">
<option value="0">Recoger en local</option>
<option value="30">Envío $30</option>
</select>

<button onclick="sendWhatsApp()" class="bg-green-500 w-full mt-2 py-2 rounded">
Enviar pedido
</button>

<button onclick="toggleCart()" class="mt-2 text-red-400">Cerrar</button>
</div>

<script>

let selectedProduct = null;

let products = [];

// GENERAMOS MUCHOS PRODUCTOS
for(let i=1;i<=25;i++){
products.push({
name:"Hamburguesa "+i,
price:80 + i,
img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd",
desc:"Deliciosa hamburguesa número "+i+" con ingredientes premium 🔥",
extras:[
{name:"Queso extra",price:15},
{name:"Tocino",price:20},
{name:"Carne extra",price:30}
]
});
}

let cart=[];

function renderProducts(){
let container=document.getElementById("products");
container.innerHTML="";

products.forEach((p,i)=>{
container.innerHTML+=`
<div onclick="openModal(${i})" class="bg-gray-900 rounded-xl overflow-hidden">
<img src="${p.img}" class="w-full h-40 object-cover">
<div class="p-3">
<h3>${p.name}</h3>
<p>$${p.price}</p>
</div>
</div>`;
});
}

function openModal(i){
selectedProduct=products[i];

document.getElementById("modal").classList.remove("hidden");
document.getElementById("modalName").innerText=selectedProduct.name;
document.getElementById("modalDesc").innerText=selectedProduct.desc;

let extrasHTML="";
selectedProduct.extras.forEach((e,index)=>{
extrasHTML+=`
<label>
<input type="checkbox" value="${index}">
${e.name} +$${e.price}
</label><br>`;
});

document.getElementById("extras").innerHTML=extrasHTML;
}

function closeModal(){
document.getElementById("modal").classList.add("hidden");
}

function addToCartWithExtras(){
let checks=document.querySelectorAll("#extras input");
let total=selectedProduct.price;
let name=selectedProduct.name;

checks.forEach(c=>{
if(c.checked){
let e=selectedProduct.extras[c.value];
total+=e.price;
name+=" + "+e.name;
}
});

cart.push({name,price:total});
updateCart();
closeModal();
}

function updateCart(){
let html="";
let total=0;

cart.forEach(i=>{
html+=`<div>${i.name} - $${i.price}</div>`;
total+=i.price;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText="$"+total;
document.getElementById("count").innerText=cart.length;
}

function toggleCart(){
document.getElementById("cartPanel").classList.toggle("hidden");
}

function sendWhatsApp(){
let msg="Pedido:%0A";
let total=0;

cart.forEach(i=>{
msg+=`- ${i.name} $${i.price}%0A`;
total+=i.price;
});

let envio=document.getElementById("envio").value;
let pago=document.getElementById("pago").value;

total+=parseInt(envio);

msg+=`Envío: $${envio}%0A`;
msg+=`Pago: ${pago}%0A`;
msg+=`Total: $${total}`;

window.open("https://wa.me/5215550572742?text="+msg);
}

renderProducts();

</script>

</body>
</html>
