<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smash House PRO</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0;font-family:sans-serif}

/* VIDEO */
.video-bg{
position:fixed;
top:0;left:0;
width:100%;height:100%;
object-fit:cover;
z-index:-2;
}

/* fallback */
.fallback{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:url('https://images.unsplash.com/photo-1550547660-d9450f859349') center/cover;
z-index:-3;
}

/* glass */
.glass{
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

/* cards */
.card{transition:.3s}
.card:hover{transform:scale(1.05)}

/* overlay */
.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;
z-index:40;
}
</style>
</head>

<body class="text-white">

<div class="fallback"></div>

<video autoplay muted loop playsinline class="video-bg">
<source src="https://cdn.coverr.co/videos/coverr-cooking-burger-over-fire-4933/1080p.mp4">
</video>

<!-- HOME -->
<div id="home" class="h-screen flex flex-col justify-center items-center glass">
<h1 class="text-5xl font-bold mb-4">🔥 Smash House</h1>
<button onclick="enterMenu()" class="bg-yellow-500 px-6 py-3 rounded text-black">Ver menú</button>
</div>

<!-- MENU -->
<div id="menu" class="hidden">

<div class="glass p-4 text-center">
<h1 class="text-2xl">🍔 Menú</h1>
<p>⭐ 4.9 • Ecatepec</p>
</div>

<div id="products" class="p-4 grid gap-4"></div>

<!-- BOTÓN -->
<div class="fixed bottom-5 right-5 z-50">
<button onclick="openCart()" class="bg-green-500 p-4 rounded-full">
🛒 <span id="count">0</span>
</button>
</div>

<div id="overlay" class="overlay" onclick="closeCart()"></div>

<!-- CARRITO -->
<div id="cartPanel" class="fixed bottom-0 left-0 right-0 bg-black p-4 hidden z-50 max-h-[70vh] overflow-y-auto">

<div class="flex justify-between">
<h2>Tu pedido</h2>
<button onclick="closeCart()">✖</button>
</div>

<div id="cartItems"></div>
<p id="total"></p>

<button onclick="getLocation()" class="bg-blue-500 w-full mt-2">Ubicación 📍</button>

<input id="direccion" placeholder="Dirección" class="w-full text-black mt-2">
<input id="cambio" placeholder="¿Con cuánto pagarás?" class="w-full text-black mt-2">

<select id="metodoPago" class="w-full text-black mt-2">
<option>Efectivo</option>
<option>Transferencia</option>
</select>

<button onclick="sendWhatsApp()" class="bg-green-500 w-full mt-2">Enviar pedido</button>

</div>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-90 hidden flex items-center justify-center">
<div class="bg-gray-900 p-4 rounded w-11/12">
<h2 id="modalName"></h2>
<p id="modalDesc"></p>
<div id="extras"></div>

<button onclick="confirmAdd()" class="bg-green-500 w-full mt-2">Agregar</button>
<button onclick="closeModal()" class="text-red-400 mt-2">Cerrar</button>
</div>
</div>

<!-- ADMIN -->
<button onclick="showAdmin()" class="fixed top-5 right-5 bg-yellow-500 px-3 py-1 rounded">⚙️</button>

<div id="admin" class="hidden fixed inset-0 bg-black p-4 overflow-y-auto">
<input id="pass" type="password" placeholder="Contraseña" class="text-black">
<button onclick="login()">Entrar</button>

<div id="panel" class="hidden">
<h2>Admin</h2>

<input id="nombre" placeholder="Nombre" class="text-black">
<input id="precio" placeholder="Precio" class="text-black">

<button onclick="addProduct()">Agregar</button>

<div id="adminList"></div>
</div>
</div>

</div>

<script>

// PRODUCTOS CON EXTRAS
let products=[
{
name:"Clásica",price:90,cat:"burger",
extras:[
{name:"Queso",price:15},
{name:"Tocino",price:20}
]
}
];

// GENERAR 25
while(products.length<25){
products.push({...products[0],name:"Burger "+products.length});
}

let cart=[];
let selectedProduct=null;

// MENU
function enterMenu(){
home.style.display="none";
menu.classList.remove("hidden");
renderProducts();
}

// RENDER
function renderProducts(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card glass p-3 rounded">
<h3>${p.name}</h3>
<p>$${p.price}</p>
<button onclick="openModal(${i})">Agregar</button>
</div>`;
});
productsDiv=document.getElementById("products");
productsDiv.innerHTML=html;
}

// MODAL
function openModal(i){
selectedProduct=products[i];
modal.classList.remove("hidden");

modalName.innerText=selectedProduct.name;

let html="";
selectedProduct.extras.forEach(e=>{
html+=`
<label>
<input type="checkbox" data-price="${e.price}">
${e.name} +$${e.price}
</label><br>`;
});
extras.innerHTML=html;
}

function closeModal(){
modal.classList.add("hidden");
}

function confirmAdd(){
let total=selectedProduct.price;

document.querySelectorAll("#extras input").forEach(e=>{
if(e.checked){
total+=parseInt(e.dataset.price);
}
});

cart.push({name:selectedProduct.name,price:total});
updateCart();
closeModal();
}

// CARRITO
function updateCart(){
let html="";
let total=0;

cart.forEach((p,i)=>{
html+=`
<div>
${p.name} $${p.price}
<button onclick="removeItem(${i})">❌</button>
</div>`;
total+=p.price;
});

cartItems.innerHTML=html;
totalEl.innerText="Total: $"+total;
count.innerText=cart.length;
}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

// UI
function openCart(){
cartPanel.classList.remove("hidden");
overlay.style.display="block";
}
function closeCart(){
cartPanel.classList.add("hidden");
overlay.style.display="none";
}

// ADMIN
function showAdmin(){admin.classList.remove("hidden");}

function login(){
if(pass.value==="1234"){
panel.classList.remove("hidden");
renderAdmin();
}
}

function renderAdmin(){
let html="";
products.forEach((p,i)=>{
html+=`${p.name} <button onclick="deleteP(${i})">❌</button><br>`;
});
adminList.innerHTML=html;
}

function deleteP(i){
products.splice(i,1);
renderProducts();
renderAdmin();
}

function addProduct(){
products.push({name:nombre.value,price:parseInt(precio.value),extras:[]});
renderProducts();
renderAdmin();
}

// UBICACIÓN
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
ubicacion=`https://maps.google.com?q=${pos.coords.latitude},${pos.coords.longitude}`;
});
}

// WHATS
function sendWhatsApp(){
let msg="Pedido:%0A";
cart.forEach(p=>msg+=`${p.name} $${p.price}%0A`);
window.open("https://wa.me/5215550572742?text="+msg);
}
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
e.preventDefault();
deferredPrompt = e;
document.getElementById("installBtn").style.display = "block";
});

document.getElementById("installBtn").addEventListener("click", async () => {

if(deferredPrompt){
deferredPrompt.prompt();
const choice = await deferredPrompt.userChoice;

deferredPrompt = null;

}else{
alert("Para instalar:\n\nEn iPhone:\nCompartir → Agregar a inicio\n\nEn Android: aparece automático");
}

});
</script>

</body>
<button id="installBtn" class="fixed top-5 left-5 bg-green-500 px-3 py-1 rounded z-50">
📲 Instalar App
</button>
</html>
