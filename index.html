<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smash House</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #ff3c00, #0f0f0f);
}
</style>
</head>

<body class="text-white font-sans">

<!-- HEADER -->
<div class="p-4 text-center bg-black">
<h1 class="text-2xl font-bold">🔥 Smash House</h1>
<p class="text-gray-400 text-sm">Sabor que prende 🔥</p>
</div>

<!-- INFO -->
<div class="p-4 text-sm text-gray-300">
📍 Ecatepec  
<br>⏰ 2:00 PM - 11:00 PM  
</div>

<!-- PRODUCTOS -->
<div id="products" class="p-4 grid gap-4"></div>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-80 hidden flex items-center justify-center">
  <div class="bg-gray-900 p-4 rounded-lg w-11/12">
    <h2 id="modalName" class="text-xl font-bold"></h2>
    <p id="modalDesc" class="text-gray-400"></p>

    <div id="extras" class="mt-3"></div>

    <button onclick="addToCartWithExtras()" class="bg-green-500 w-full mt-3 py-2 rounded">
      Agregar
    </button>

    <button onclick="closeModal()" class="mt-2 text-red-400">Cerrar</button>
  </div>
</div>

<!-- CARRITO -->
<div class="fixed bottom-0 w-full bg-black p-4">
<div id="cartItems"></div>
<p id="total">$0</p>

<select id="pago" class="w-full mt-2 text-black">
<option>Efectivo</option>
<option>Transferencia</option>
</select>

<select id="envio" class="w-full mt-2 text-black">
<option value="0">Recoger en local</option>
<option value="30">Envío $30</option>
</select>

<button onclick="sendWhatsApp()" class="bg-green-500 w-full mt-2 py-2 rounded">
Enviar pedido
</button>
</div>

<script>

let selectedProduct = null;

let products = [
{
name:"Smash Clásica",
price:85,
img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd",
desc:"Carne smash, queso, lechuga",
extras:[{name:"Queso extra",price:15},{name:"Tocino",price:20}]
},
{
name:"BBQ Bacon",
price:130,
img:"https://images.unsplash.com/photo-1550547660-d9450f859349",
desc:"BBQ, tocino, doble carne",
extras:[{name:"Carne extra",price:30},{name:"Papas",price:25}]
}
];

let cart=[];

function renderProducts(){
let container=document.getElementById("products");
container.innerHTML="";

products.forEach((p,i)=>{
container.innerHTML+=`
<div onclick="openModal(${i})" class="bg-gray-900 rounded-xl overflow-hidden">
<img src="${p.img}" class="w-full h-40 object-cover">
<div class="p-3">
<h3>${p.name}</h3>
<p>$${p.price}</p>
</div>
</div>`;
});
}

function openModal(i){
selectedProduct = products[i];

document.getElementById("modal").classList.remove("hidden");
document.getElementById("modalName").innerText=selectedProduct.name;
document.getElementById("modalDesc").innerText=selectedProduct.desc;

let extrasHTML="";
selectedProduct.extras.forEach((e,index)=>{
extrasHTML+=`
<label>
<input type="checkbox" value="${index}">
${e.name} +$${e.price}
</label><br>`;
});

document.getElementById("extras").innerHTML=extrasHTML;
}

function closeModal(){
document.getElementById("modal").classList.add("hidden");
}

function addToCartWithExtras(){
let checkboxes=document.querySelectorAll("#extras input");
let total=selectedProduct.price;
let desc=selectedProduct.name;

checkboxes.forEach(c=>{
if(c.checked){
let extra=selectedProduct.extras[c.value];
total+=extra.price;
desc+=" + "+extra.name;
}
});

cart.push({name:desc,price:total});
updateCart();
closeModal();
}

function updateCart(){
let items="";
let total=0;

cart.forEach(i=>{
items+=`<div>${i.name} - $${i.price}</div>`;
total+=i.price;
});

let envio=document.getElementById("envio").value;
total+=parseInt(envio);

document.getElementById("cartItems").innerHTML=items;
document.getElementById("total").innerText="$"+total;
}

function sendWhatsApp(){
let msg="Pedido:%0A";
let total=0;

cart.forEach(i=>{
msg+=`- ${i.name} $${i.price}%0A`;
total+=i.price;
});

let envio=document.getElementById("envio").value;
let pago=document.getElementById("pago").value;

total+=parseInt(envio);

msg+=`Envío: $${envio}%0A`;
msg+=`Pago: ${pago}%0A`;
msg+=`Total: $${total}`;

window.open("https://wa.me/5215550572742?text="+msg);
}

renderProducts();

</script>

</body>
</html>
