<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smash House PRO</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0;font-family:sans-serif;overflow-x:hidden}

/* VIDEO */
.video-bg{
position:fixed;
top:0;left:0;
width:100%;height:100%;
object-fit:cover;
z-index:-2;
}

/* fallback */
.fallback{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:url('https://images.unsplash.com/photo-1550547660-d9450f859349') center/cover;
z-index:-3;
}

/* glass */
.glass{
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

/* animaciones */
.card{transition:.3s}
.card:hover{transform:scale(1.05)}

/* overlay */
.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;
z-index:40;
}
</style>
</head>

<body class="text-white">

<div class="fallback"></div>

<video autoplay muted loop playsinline class="video-bg">
<source src="https://cdn.coverr.co/videos/coverr-cooking-burger-over-fire-4933/1080p.mp4">
</video>

<!-- HOME -->
<div id="home" class="h-screen flex flex-col justify-center items-center glass">
<h1 class="text-5xl font-bold mb-4">🔥 Smash House</h1>
<p class="mb-6">Las mejores burgers 🔥</p>
<button onclick="enterMenu()" class="bg-yellow-500 px-6 py-3 rounded text-black">Ver menú</button>
</div>

<!-- MENU -->
<div id="menu" class="hidden">

<div class="glass p-4 text-center">
<h1 class="text-2xl">🍔 Menú</h1>
<p>⭐ 4.9 (520 reseñas) • Ecatepec</p>
</div>

<!-- CATEGORÍAS -->
<div class="flex gap-2 p-3 overflow-x-auto glass">
<button onclick="renderProducts('all')" class="bg-yellow-500 px-3 py-1 rounded-full">Todo</button>
<button onclick="renderProducts('burger')" class="bg-gray-800 px-3 py-1 rounded-full">🍔</button>
<button onclick="renderProducts('tacos')" class="bg-gray-800 px-3 py-1 rounded-full">🌮</button>
<button onclick="renderProducts('bebidas')" class="bg-gray-800 px-3 py-1 rounded-full">🥤</button>
<button onclick="renderProducts('postres')" class="bg-gray-800 px-3 py-1 rounded-full">🍰</button>
</div>

<div id="products" class="p-4 grid gap-4"></div>

<!-- BOTÓN CARRITO -->
<div class="fixed bottom-5 right-5 z-50">
<button onclick="openCart()" class="bg-green-500 p-4 rounded-full shadow-lg">
🛒 <span id="count">0</span>
</button>
</div>

<div id="overlay" class="overlay" onclick="closeCart()"></div>

<!-- CARRITO -->
<div id="cartPanel" class="fixed bottom-0 left-0 right-0 bg-black p-4 hidden z-50 rounded-t-xl max-h-[70vh] overflow-y-auto">

<div class="flex justify-between mb-2">
<h2>Tu pedido</h2>
<button onclick="closeCart()">✖</button>
</div>

<div id="cartItems"></div>
<p id="total"></p>

<button onclick="getLocation()" class="bg-blue-500 w-full mt-2">Ubicación 📍</button>

<input id="direccion" placeholder="Dirección" class="w-full text-black mt-2">
<input id="cambio" placeholder="¿Con cuánto pagarás?" class="w-full text-black mt-2">

<select id="metodoPago" class="w-full text-black mt-2">
<option>Efectivo</option>
<option>Transferencia</option>
</select>

<button onclick="sendWhatsApp()" class="bg-green-500 w-full mt-2">Enviar pedido</button>

</div>

</div>

<script>

// PRODUCTOS VARIADOS
let baseProducts=[
{cat:"burger",name:"Clásica",price:90,img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd"},
{cat:"burger",name:"BBQ",price:130,img:"https://images.unsplash.com/photo-1606755962773-d324e0a13086"},
{cat:"tacos",name:"Pastor",price:70,img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"},
{cat:"bebidas",name:"Refresco",price:25,img:"https://images.unsplash.com/photo-1581006852262-e4307cf6283a"},
{cat:"postres",name:"Brownie",price:45,img:"https://images.unsplash.com/photo-1606313564200-e75d5e30476c"}
];

let products=[];
while(products.length<25){
products.push({...baseProducts[products.length%5],name:baseProducts[products.length%5].name+" "+products.length});
}

let cart=[];
let ubicacion="";

// ENTRAR
function enterMenu(){
home.style.display="none";
menu.classList.remove("hidden");
renderProducts();
}

// RENDER
function renderProducts(cat="all"){
let html="";
products.forEach((p,i)=>{
if(cat==="all"||p.cat===cat){
html+=`
<div class="card glass p-3 rounded">
<img src="${p.img}" class="w-full h-32 object-cover rounded">
<h3>${p.name}</h3>
<p>$${p.price}</p>
<button onclick="addToCart(${i})" class="bg-green-500 w-full mt-2">Agregar</button>
</div>`;
}
});
products.innerHTML=html;
document.getElementById("products").innerHTML=html;
}

// CARRITO
function addToCart(i){
cart.push(products[i]);
updateCart();
}

function updateCart(){
let html="";
let total=0;

cart.forEach((p,i)=>{
html+=`
<div class="flex justify-between">
<span>${p.name} $${p.price}</span>
<button onclick="removeItem(${i})">❌</button>
</div>`;
total+=p.price;
});

cartItems.innerHTML=html;
totalEl.innerText="Total: $"+total;
count.innerText=cart.length;
}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

// UI carrito
function openCart(){
cartPanel.classList.remove("hidden");
overlay.style.display="block";
}

function closeCart(){
cartPanel.classList.add("hidden");
overlay.style.display="none";
}

// ubicación
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
ubicacion=`https://maps.google.com?q=${pos.coords.latitude},${pos.coords.longitude}`;
alert("Ubicación lista 📍");
});
}

// whatsapp
function sendWhatsApp(){
let msg="🔥 Pedido:%0A";
let total=0;

cart.forEach(p=>{
msg+=`${p.name} $${p.price}%0A`;
total+=p.price;
});

msg+=`%0ATotal: $${total}`;
msg+=`%0ADirección: ${direccion.value}`;
msg+=`%0AUbicación: ${ubicacion}`;
msg+=`%0AMétodo: ${metodoPago.value}`;
msg+=`%0APagaré con: $${cambio.value}`;

window.open("https://wa.me/5215550572742?text="+msg);
}

</script>

</body>
</html>
