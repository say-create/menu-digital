<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smash House</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(180deg,#1a1a1a,#000);
}
</style>
</head>

<body class="text-white font-sans">

<!-- HEADER -->
<div class="p-4 text-center bg-black">
<h1 class="text-2xl font-bold">🔥 Smash House</h1>
<p class="text-gray-400 text-sm">Sabor que prende 🔥</p>
<p id="estado" class="text-green-400 text-sm mt-1"></p>
</div>

<!-- PRODUCTOS -->
<div id="products" class="p-4 grid gap-4"></div>

<!-- BOTÓN -->
<div class="fixed bottom-5 right-5">
<button onclick="toggleCart()" class="bg-green-500 p-4 rounded-full">
🛒 <span id="count">0</span>
</button>
</div>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-80 hidden flex items-center justify-center">
<div class="bg-gray-900 p-4 rounded-lg w-11/12 max-h-[80vh] overflow-y-auto">
<h2 id="modalName"></h2>
<p id="modalDesc"></p>
<div id="extras"></div>

<button onclick="addToCartWithExtras()" class="bg-green-500 w-full mt-3 py-2 rounded">Agregar</button>
<button onclick="closeModal()" class="mt-2 text-red-400">Cerrar</button>
</div>
</div>

<!-- CARRITO -->
<div id="cartPanel" class="fixed bottom-0 left-0 right-0 bg-black p-4 hidden max-h-[75vh] overflow-y-auto">

<h2>Tu pedido</h2>
<div id="cartItems"></div>
<p id="total">$0</p>

<input id="nombre" placeholder="Tu nombre" class="w-full mt-2 p-2 text-black">
<input id="direccion" placeholder="Dirección" class="w-full mt-2 p-2 text-black">

<button onclick="getLocation()" class="bg-blue-500 w-full mt-2 py-2 rounded">
Usar mi ubicación 📍
</button>

<div id="mapa" class="hidden mt-2">
<iframe id="mapFrame" class="w-full h-40"></iframe>
</div>

<textarea id="nota" placeholder="Notas" class="w-full mt-2 p-2 text-black"></textarea>

<select id="pago" class="w-full mt-2 text-black">
<option>Efectivo</option>
<option>Transferencia</option>
</select>

<select id="envio" class="w-full mt-2 text-black">
<option value="0">Recoger</option>
</select>

<button onclick="sendWhatsApp()" class="bg-green-500 w-full mt-2 py-2 rounded">
Enviar pedido
</button>

<button onclick="toggleCart()" class="mt-2 text-red-400">Cerrar</button>

</div>

<script>

// CONFIG
const negocioLat = 19.6018;
const negocioLon = -99.0506;
const maxDistancia = 10; // km
const pedidoMin = 100;

// HORARIO
function checkHorario(){
let h = new Date().getHours();
let abierto = (h>=14 && h<=23);

document.getElementById("estado").innerText =
abierto ? "🟢 Abierto" : "🔴 Cerrado";

return abierto;
}

// PRODUCTOS
let products=[];
for(let i=1;i<=25;i++){
products.push({
name:"Hamburguesa "+i,
price:80+i,
img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd",
desc:"Hamburguesa deliciosa 🔥",
extras:[
{name:"Queso extra",price:15},
{name:"Tocino",price:20},
{name:"Carne extra",price:30}
]
});
}

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let selectedProduct=null;
let ubicacionLink="";
let distancia=0;

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
}

function renderProducts(){
let html="";
products.forEach((p,i)=>{
html+=`
<div onclick="openModal(${i})" class="bg-gray-900 rounded-xl overflow-hidden">
<img src="${p.img}" class="w-full h-40 object-cover">
<div class="p-3">
<h3>${p.name}</h3>
<p>$${p.price}</p>
</div>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function openModal(i){
selectedProduct=products[i];
document.getElementById("modal").classList.remove("hidden");

document.getElementById("modalName").innerText=selectedProduct.name;
document.getElementById("modalDesc").innerText=selectedProduct.desc;

let extrasHTML="";
selectedProduct.extras.forEach((e,index)=>{
extrasHTML+=`
<label>
<input type="checkbox" value="${index}">
${e.name} +$${e.price}
</label><br>`;
});

document.getElementById("extras").innerHTML=extrasHTML;
}

function closeModal(){
document.getElementById("modal").classList.add("hidden");
}

function addToCartWithExtras(){
let checks=document.querySelectorAll("#extras input");
let total=selectedProduct.price;
let name=selectedProduct.name;

checks.forEach(c=>{
if(c.checked){
let e=selectedProduct.extras[c.value];
total+=e.price;
name+=" + "+e.name;
}
});

cart.push({name,price:total});
saveCart();
updateCart();
closeModal();
}

function updateCart(){
let html="";
let total=0;

cart.forEach(i=>{
html+=`<div>${i.name} - $${i.price}</div>`;
total+=i.price;
});

total+=parseInt(document.getElementById("envio").value||0);

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText="$"+total;
document.getElementById("count").innerText=cart.length;
}

function toggleCart(){
document.getElementById("cartPanel").classList.toggle("hidden");
}

function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

ubicacionLink=`https://maps.google.com?q=${lat},${lon}`;

document.getElementById("mapa").classList.remove("hidden");
document.getElementById("mapFrame").src=
`https://maps.google.com/maps?q=${lat},${lon}&output=embed`;

distancia=calcularDistancia(lat,lon,negocioLat,negocioLon);

// ZONA
if(distancia>maxDistancia){
alert("Fuera de zona 😬");
return;
}

// ENVÍO
let envio=Math.round(distancia*5);
document.getElementById("envio").value=envio;

updateCart();

});
}

function calcularDistancia(lat1,lon1,lat2,lon2){
let R=6371;
let dLat=(lat2-lat1)*Math.PI/180;
let dLon=(lon2-lon1)*Math.PI/180;

let a=Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function sendWhatsApp(){

if(!checkHorario()){
alert("Negocio cerrado 😬");
return;
}

let total=parseInt(document.getElementById("total").innerText.replace("$",""));

if(total<pedidoMin){
alert("Pedido mínimo $"+pedidoMin);
return;
}

let nombre=document.getElementById("nombre").value;
let direccion=document.getElementById("direccion").value;
let nota=document.getElementById("nota").value;

let msg="Pedido:%0A";

cart.forEach(i=>{
msg+=`- ${i.name} $${i.price}%0A`;
});

msg+=`%0ACliente: ${nombre}`;
msg+=`%0ADirección: ${direccion}`;
msg+=`%0ANotas: ${nota}`;

if(ubicacionLink){
msg+=`%0AUbicación: ${ubicacionLink}`;
msg+=`%0ADistancia: ${distancia.toFixed(2)} km`;
}

msg+=`%0ATotal: $${total}`;

window.open("https://wa.me/5215550572742?text="+msg);
}

renderProducts();
updateCart();
checkHorario();

</script>

</body>
</html>
