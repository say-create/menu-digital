<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smash House</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background: radial-gradient(circle at top,#ff3c00,#000);
}
</style>
</head>

<body class="text-white font-sans">

<!-- HEADER -->
<div class="p-4 text-center bg-black">
<h1 class="text-2xl font-bold">🔥 Smash House</h1>
<p class="text-gray-400">Las burgers más brutales 🔥</p>
<p id="estado" class="text-green-400 text-sm"></p>
</div>

<button onclick="openAdmin()" class="fixed top-5 right-5 bg-yellow-500 px-3 py-1 rounded">
⚙️
</button>

<!-- INFO -->
<div class="p-4 text-sm text-gray-300">
📍 Ecatepec  
<br>⏰ 2:00 PM - 11:00 PM  
</div>

<!-- RESEÑAS -->
<div class="px-4">
<p class="text-yellow-400">⭐⭐⭐⭐⭐ 4.8 (320 reseñas)</p>
<p class="text-gray-400 text-sm">“Las mejores burgers y tacos 🔥”</p>
</div>

<!-- CATEGORÍAS -->
<div class="flex overflow-x-auto gap-2 p-3">
<button onclick="filter('all')" class="bg-yellow-500 px-3 py-1 rounded-full">Todo</button>
<button onclick="filter('burgers')" class="bg-gray-800 px-3 py-1 rounded-full">🍔</button>
<button onclick="filter('tacos')" class="bg-gray-800 px-3 py-1 rounded-full">🌮</button>
<button onclick="filter('papas')" class="bg-gray-800 px-3 py-1 rounded-full">🍟</button>
<button onclick="filter('bebidas')" class="bg-gray-800 px-3 py-1 rounded-full">🥤</button>
<button onclick="filter('postres')" class="bg-gray-800 px-3 py-1 rounded-full">🍰</button>
<button onclick="filter('combos')" class="bg-gray-800 px-3 py-1 rounded-full">🔥</button>
</div>

<div id="products" class="p-4 grid gap-4"></div>

<!-- BOTÓN CARRITO -->
<div class="fixed bottom-5 right-5">
<button onclick="toggleCart()" class="bg-green-500 p-4 rounded-full">
🛒 <span id="count">0</span>
</button>
</div>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-80 hidden flex items-center justify-center">
<div class="bg-gray-900 p-4 rounded-lg w-11/12 max-h-[80vh] overflow-y-auto">
<h2 id="modalName"></h2>
<p id="modalDesc"></p>
<div id="extras"></div>

<button onclick="addToCartWithExtras()" class="bg-green-500 w-full mt-3 py-2 rounded">
Agregar
</button>

<button onclick="closeModal()" class="mt-2 text-red-400">Cerrar</button>
</div>
</div>

<!-- CARRITO -->
<div id="cartPanel" class="fixed bottom-0 left-0 right-0 bg-black p-4 hidden max-h-[75vh] overflow-y-auto">

<h2>Tu pedido</h2>
<div id="cartItems"></div>
<p id="total">$0</p>

<input id="nombre" placeholder="Tu nombre" class="w-full mt-2 p-2 text-black">
<input id="direccion" placeholder="Dirección" class="w-full mt-2 p-2 text-black">

<button onclick="getLocation()" class="bg-blue-500 w-full mt-2 py-2 rounded">
Usar mi ubicación 📍
</button>

<div id="mapa" class="hidden mt-2">
<iframe id="mapFrame" class="w-full h-40"></iframe>
</div>

<textarea id="nota" placeholder="Notas del pedido" class="w-full mt-2 p-2 text-black"></textarea>

<select id="pago" class="w-full mt-2 text-black">
<option>Efectivo</option>
<option>Transferencia</option>
</select>

<select id="envio" class="w-full mt-2 text-black">
<option value="0">Recoger</option>
</select>

<button onclick="sendWhatsApp()" class="bg-green-500 w-full mt-2 py-2 rounded">
Enviar pedido
</button>

<button onclick="toggleCart()" class="mt-2 text-red-400">Cerrar</button>

</div>

<!-- PANEL ADMIN -->
<div id="adminPanel" class="fixed inset-0 bg-black bg-opacity-90 hidden p-4 overflow-y-auto">

<h2 class="text-xl mb-3">Panel de edición</h2>

<input id="newName" placeholder="Nombre" class="w-full p-2 mb-2 text-black">
<input id="newPrice" placeholder="Precio" type="number" class="w-full p-2 mb-2 text-black">
<input id="newDesc" placeholder="Descripción" class="w-full p-2 mb-2 text-black">
<input id="newImg" placeholder="URL imagen" class="w-full p-2 mb-2 text-black">

<select id="newCat" class="w-full p-2 mb-2 text-black">
<option value="burgers">Burgers</option>
<option value="tacos">Tacos</option>
<option value="papas">Papas</option>
<option value="bebidas">Bebidas</option>
<option value="postres">Postres</option>
<option value="combos">Combos</option>
</select>

<input id="newExtra" placeholder="Extras (queso:15,tocino:20)" class="w-full p-2 mb-2 text-black">

<button onclick="addProduct()" class="bg-green-500 w-full py-2 mb-2">Agregar producto</button>
<button onclick="closeAdmin()" class="bg-red-500 w-full py-2">Cerrar</button>

</div>

<script>

// REGISTRO SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

// PRODUCTOS BASE
let products = JSON.parse(localStorage.getItem("products")) || [
{category:"burgers",name:"Smash clásica",price:90,desc:"Carne y queso",img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd",extras:[{name:"Queso",price:15}]},
{category:"tacos",name:"Tacos pastor",price:70,desc:"Con piña",img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092",extras:[{name:"Queso",price:15}]},
{category:"bebidas",name:"Malteada",price:60,desc:"Chocolate",img:"https://images.unsplash.com/photo-1572490122747-3968b75cc699",extras:[{name:"Chantilly",price:10}]}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let selectedProduct=null;

function saveAll(){
localStorage.setItem("cart",JSON.stringify(cart));
localStorage.setItem("products",JSON.stringify(products));
}

function renderProducts(cat="all"){
let html="";
products.forEach((p,i)=>{
if(cat==="all"||p.category===cat){
html+=`
<div onclick="openModal(${i})" class="bg-gray-900 rounded-xl overflow-hidden">
<img src="${p.img}" class="w-full h-40 object-cover">
<div class="p-3">
<h3>${p.name}</h3>
<p>$${p.price}</p>
</div>
</div>`;
}
});
products.innerHTML=html;
document.getElementById("products").innerHTML=html;
}

function openModal(i){
selectedProduct=products[i];
modal.classList.remove("hidden");

modalName.innerText=selectedProduct.name;
modalDesc.innerText=selectedProduct.desc;

let extrasHTML="";
selectedProduct.extras.forEach((e,index)=>{
extrasHTML+=`<label><input type="checkbox" value="${index}"> ${e.name} +$${e.price}</label><br>`;
});
extras.innerHTML=extrasHTML;
}

function closeModal(){modal.classList.add("hidden");}

function addToCartWithExtras(){
let checks=document.querySelectorAll("#extras input");
let total=selectedProduct.price;
let name=selectedProduct.name;

checks.forEach(c=>{
if(c.checked){
let e=selectedProduct.extras[c.value];
total+=e.price;
name+=" + "+e.name;
}
});

cart.push({name,price:total});
saveAll();
updateCart();
closeModal();
}

function updateCart(){
let html="";
let total=0;

cart.forEach(i=>{
html+=`<div>${i.name} - $${i.price}</div>`;
total+=i.price;
});

cartItems.innerHTML=html;
document.getElementById("total").innerText="$"+total;
count.innerText=cart.length;
}

function toggleCart(){cartPanel.classList.toggle("hidden");}

function sendWhatsApp(){
let msg="Pedido:%0A";
cart.forEach(i=>{msg+=`- ${i.name} $${i.price}%0A`;});
window.open("https://wa.me/5215550572742?text="+msg);
}

function openAdmin(){adminPanel.classList.remove("hidden");}
function closeAdmin(){adminPanel.classList.add("hidden");}

function addProduct(){
let extrasArr=[];
newExtra.value.split(",").forEach(e=>{
let p=e.split(":");
if(p.length==2) extrasArr.push({name:p[0],price:parseInt(p[1])});
});

products.push({
name:newName.value,
price:parseInt(newPrice.value),
desc:newDesc.value,
img:newImg.value,
category:newCat.value,
extras:extrasArr
});

saveAll();
renderProducts();
}

renderProducts();
updateCart();

</script>

</body>
</html>
